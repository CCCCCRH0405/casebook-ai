name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Format check
        run: test -z "$(gofmt -l .)"
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: JavaScript syntax check
        run: node --check web/app.js
      - name: Build
        run: go build -trimpath -o casebook .
